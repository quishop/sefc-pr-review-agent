name: MCP Agent PR Review (Reusable)

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      JIRA_BASE_URL:
        required: true
      JIRA_EMAIL:
        required: true
      JIRA_TOKEN:
        required: true

permissions:
  pull-requests: write
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.test.outcome }}
      coverage: ${{ steps.coverage.outputs.pct }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect project type
        id: detect
        run: |
          if [ -f "package.json" ]; then
            echo "type=node" >> $GITHUB_OUTPUT
          elif [ -f "Pipfile" ] || [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            echo "type=python" >> $GITHUB_OUTPUT
          else
            echo "type=unknown" >> $GITHUB_OUTPUT
          fi

      # Node.js projects
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.type == 'node'
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        if: steps.detect.outputs.type == 'node'
      - run: npm run lint
        if: steps.detect.outputs.type == 'node'
        continue-on-error: true
      - name: Run tests (Node)
        id: test-node
        if: steps.detect.outputs.type == 'node'
        run: npm test -- --coverage --coverageReporters=json-summary 2>/dev/null || npm test
        continue-on-error: true
      - name: Extract coverage (Node)
        if: steps.detect.outputs.type == 'node'
        id: coverage-node
        run: |
          PCT=$(node -e "const s=require('./coverage/coverage-summary.json');console.log(s.total.lines.pct)" 2>/dev/null || echo "N/A")
          echo "pct=$PCT" >> $GITHUB_OUTPUT

      # Python projects
      - uses: actions/setup-python@v5
        if: steps.detect.outputs.type == 'python'
        with:
          python-version: '3.12'
      - name: Install Python deps
        if: steps.detect.outputs.type == 'python'
        run: |
          pip install pipenv 2>/dev/null || true
          if [ -f "Pipfile" ]; then
            pipenv install --dev 2>/dev/null || pip install -r requirements.txt 2>/dev/null || true
          elif [ -f "requirements.txt" ]; then
            pip install -r requirements.txt 2>/dev/null || true
          fi
      - name: Run tests (Python)
        id: test-python
        if: steps.detect.outputs.type == 'python'
        run: |
          if command -v pytest &>/dev/null; then
            pytest --tb=short 2>/dev/null || true
          fi
        continue-on-error: true

      # Unified test outcome
      - name: Set test outcome
        id: test
        run: |
          NODE_RESULT="${{ steps.test-node.outcome }}"
          PY_RESULT="${{ steps.test-python.outcome }}"
          if [ "$NODE_RESULT" = "success" ] || [ "$PY_RESULT" = "success" ]; then
            echo "outcome=success" >> $GITHUB_OUTPUT
          else
            echo "outcome=failure" >> $GITHUB_OUTPUT
          fi
      - name: Set coverage
        id: coverage
        run: |
          NODE_PCT="${{ steps.coverage-node.outputs.pct }}"
          echo "pct=${NODE_PCT:-N/A}" >> $GITHUB_OUTPUT

  mcp-agent-review:
    name: MCP Agent Review
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: always() && !github.event.pull_request.draft
    concurrency:
      group: pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    continue-on-error: true  # Week 1: never block merge
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout shared-workflows
        uses: actions/checkout@v4
        with:
          repository: quishop/sefc-pr-review-agent
          path: .shared-workflows
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff
          echo "Diff size: $(wc -c < /tmp/pr.diff) bytes, $(wc -l < /tmp/pr.diff) lines"

      - name: Extract Jira ticket from branch name
        id: jira
        run: |
          TICKET=$(echo "${{ github.head_ref }}" | grep -oP '[A-Z]+-\d+' | head -1 || echo "")
          echo "key=$TICKET" >> $GITHUB_OUTPUT
          echo "Jira ticket: ${TICKET:-not found}"

      - name: Run MCP Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          JIRA_TICKET: ${{ steps.jira.outputs.key }}
          TEST_PASSED: ${{ needs.lint-and-test.outputs.passed }}
          COVERAGE: ${{ needs.lint-and-test.outputs.coverage }}
        run: node .shared-workflows/scripts/mcp-agent.mjs
